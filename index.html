<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OpenClaw Calendar</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #1a1a2e, #16213e); min-height: 100vh; color: #fff; padding: 20px; }
.header { text-align: center; padding: 20px 0; }
.header h1 { color: #4ecca3; font-size: 24px; }
.calendar { max-width: 400px; margin: 0 auto; background: rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; }
.month { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.month h2 { font-size: 18px; }
.month button { background: #4ecca3; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; color: #1a1a2e; font-weight: bold; }
.days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
.day-header { color: #888; font-size: 12px; padding: 10px 0; }
.day { padding: 10px; border-radius: 8px; cursor: pointer; }
.day:hover { background: rgba(78,204,163,0.2); }
.day.today { border: 2px solid #45b7d1; }
.day.selected { background: #4ecca3; color: #1a1a2e; }
.day.other-month { opacity: 0.3; }
.tasks { margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
.tasks h3 { color: #4ecca3; margin-bottom: 15px; font-size: 16px; }
.task-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; margin-bottom: 10px; display: flex; align-items: center; }
.task-item input { margin-right: 10px; width: 20px; height: 20px; }
.task-item.completed span { text-decoration: line-through; opacity: 0.5; }
.add-task { display: flex; margin-top: 15px; }
.add-task input { flex: 1; padding: 12px; border: none; border-radius: 8px 0 0 8px; background: rgba(255,255,255,0.1); color: #fff; }
.add-task button { background: #4ecca3; border: none; padding: 12px 20px; border-radius: 0 8px 8px 0; cursor: pointer; color: #1a1a2e; font-weight: bold; }
</style>
</head>
<body>
<div class="header">
<h1>📅 OpenClaw Calendar</h1>
</div>
<div class="calendar">
<div class="month">
<button onclick="prevMonth()">◀</button>
<h2 id="monthLabel">2026年3月</h2>
<button onclick="nextMonth()">▶</button>
</div>
<div class="days">
<div class="day-header">日</div><div class="day-header">一</div><div class="day-header">二</div><div class="day-header">三</div><div class="day-header">四</div><div class="day-header">五</div><div class="day-header">六</div>
</div>
<div class="days" id="calendarDays"></div>
<div class="tasks">
<h3 id="taskDate">3月10日 任务</h3>
<div id="taskList"></div>
<div class="add-task">
<input type="text" id="newTask" placeholder="添加新任务...">
<button onclick="addTask()">添加</button>
</div>
</div>
</div>
<script>
let currentDate = new Date();
let selectedDate = new Date();
let tasks = JSON.parse(localStorage.getItem('calendarTasks') || '{}');

function render() {
    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();
    document.getElementById('monthLabel').textContent = year + '年' + (month + 1) + '月';
    
    const firstDay = new Date(year, month, 1);
    const lastDay = new Date(year, month + 1, 0);
    const startDay = firstDay.getDay();
    const daysInMonth = lastDay.getDate();
    
    let html = '';
    const today = new Date();
    const prevMonthDays = new Date(year, month, 0).getDate();
    
    for (let i = startDay - 1; i >= 0; i--) {
        html += '<div class="day other-month">' + (prevMonthDays - i) + '</div>';
    }
    
    for (let i = 1; i <= daysInMonth; i++) {
        let classes = 'day';
        if (i === today.getDate() && month === today.getMonth() && year === today.getFullYear()) classes += ' today';
        if (i === selectedDate.getDate() && month === selectedDate.getMonth() && year === selectedDate.getFullYear()) classes += ' selected';
        html += '<div class="' + classes + '" onclick="selectDate(' + year + ', ' + month + ', ' + i + ')">' + i + '</div>';
    }
    
    const remaining = 42 - (startDay + daysInMonth);
    for (let i = 1; i <= remaining; i++) {
        html += '<div class="day other-month">' + i + '</div>';
    }
    
    document.getElementById('calendarDays').innerHTML = html;
    renderTasks();
}

function selectDate(year, month, day) {
    selectedDate = new Date(year, month, day);
    render();
}

function prevMonth() { currentDate.setMonth(currentDate.getMonth() - 1); render(); }
function nextMonth() { currentDate.setMonth(currentDate.getMonth() + 1); render(); }

function renderTasks() {
    const dateStr = selectedDate.getFullYear() + '-' + String(selectedDate.getMonth()+1).padStart(2,'0') + '-' + String(selectedDate.getDate()).padStart(2,'0');
    document.getElementById('taskDate').textContent = (selectedDate.getMonth()+1) + '月' + selectedDate.getDate() + '日 任务';
    
    const dayTasks = tasks[dateStr] || [];
    let html = '';
    dayTasks.forEach((task, index) => {
        html += '<div class="task-item ' + (task.completed ? 'completed' : '') + '">' +
            '<input type="checkbox" ' + (task.completed ? 'checked' : '') + ' onchange="toggleTask(\'' + dateStr + '\',' + index + ')">' +
            '<span>' + task.title + '</span></div>';
    });
    if (dayTasks.length === 0) html = '<p style="color:#666;text-align:center;">暂无任务</p>';
    document.getElementById('taskList').innerHTML = html;
}

function addTask() {
    const title = document.getElementById('newTask').value.trim();
    if (!title) return;
    const dateStr = selectedDate.getFullYear() + '-' + String(selectedDate.getMonth()+1).padStart(2,'0') + '-' + String(selectedDate.getDate()).padStart(2,'0');
    if (!tasks[dateStr]) tasks[dateStr] = [];
    tasks[dateStr].push({title: title, completed: false});
    localStorage.setItem('calendarTasks', JSON.stringify(tasks));
    document.getElementById('newTask').value = '';
    renderTasks();
}

function toggleTask(dateStr, index) {
    tasks[dateStr][index].completed = !tasks[dateStr][index].completed;
    localStorage.setItem('calendarTasks', JSON.stringify(tasks));
    renderTasks();
}

document.getElementById('newTask').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') addTask();
});

render();
</script>
</body>
</html>
