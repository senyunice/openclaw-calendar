<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>OpenClaw Calendar</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .header {
            text-align: center;
            padding: 20px 0;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 24px;
            color: #00d9ff;
            text-shadow: 0 0 10px rgba(0, 217, 255, 0.5);
        }
        .calendar {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        .month-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .month-title {
            font-size: 20px;
            font-weight: bold;
        }
        .nav-btn {
            background: rgba(0, 217, 255, 0.2);
            border: none;
            color: #00d9ff;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            margin-bottom: 10px;
        }
        .weekday {
            text-align: center;
            color: #888;
            font-size: 12px;
            padding: 5px;
        }
        .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }
        .day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }
        .day:hover {
            background: rgba(0, 217, 255, 0.2);
        }
        .day.today {
            background: #00d9ff;
            color: #1a1a2e;
            font-weight: bold;
        }
        .day.other-month {
            color: #555;
        }
        .day.selected {
            background: #ff6b6b;
            color: #fff;
        }
        .events {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .events h3 {
            color: #00d9ff;
            margin-bottom: 10px;
        }
        .event-item {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .add-event {
            margin-top: 20px;
        }
        .add-event input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .add-event input::placeholder {
            color: #888;
        }
        .add-event button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #00d9ff;
            color: #1a1a2e;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }
        .clock {
            text-align: center;
            font-size: 48px;
            font-weight: bold;
            color: #00d9ff;
            margin: 20px 0;
            text-shadow: 0 0 20px rgba(0, 217, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📅 OpenClaw Calendar</h1>
    </div>
    
    <div class="clock" id="clock">00:00:00</div>
    
    <div class="calendar">
        <div class="month-nav">
            <button class="nav-btn" onclick="prevMonth()">◀</button>
            <span class="month-title" id="monthTitle">2026年3月</span>
            <button class="nav-btn" onclick="nextMonth()">▶</button>
        </div>
        
        <div class="weekdays">
            <div class="weekday">日</div>
            <div class="weekday">一</div>
            <div class="weekday">二</div>
            <div class="weekday">三</div>
            <div class="weekday">四</div>
            <div class="weekday">五</div>
            <div class="weekday">六</div>
        </div>
        
        <div class="days" id="days"></div>
        
        <div class="events" id="events">
            <h3>📋 今日事件</h3>
            <div id="eventList"></div>
        </div>
        
        <div class="add-event">
            <input type="text" id="eventInput" placeholder="添加新事件...">
            <button onclick="addEvent()">➕ 添加事件</button>
        </div>
    </div>

    <script>
        let currentDate = new Date();
        let selectedDate = new Date();
        let events = JSON.parse(localStorage.getItem('calendarEvents') || '{}');

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            document.getElementById('monthTitle').textContent = 
                `${year}年${month + 1}月`;
            
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const startDay = firstDay.getDay();
            const totalDays = lastDay.getDate();
            
            const today = new Date();
            const daysDiv = document.getElementById('days');
            daysDiv.innerHTML = '';
            
            // Previous month days
            const prevMonthLastDay = new Date(year, month, 0).getDate();
            for (let i = startDay - 1; i >= 0; i--) {
                const day = document.createElement('div');
                day.className = 'day other-month';
                day.textContent = prevMonthLastDay - i;
                daysDiv.appendChild(day);
            }
            
            // Current month days
            for (let i = 1; i <= totalDays; i++) {
                const day = document.createElement('div');
                day.className = 'day';
                day.textContent = i;
                
                if (today.getFullYear() === year && 
                    today.getMonth() === month && 
                    today.getDate() === i) {
                    day.classList.add('today');
                }
                
                if (selectedDate.getFullYear() === year && 
                    selectedDate.getMonth() === month && 
                    selectedDate.getDate() === i) {
                    day.classList.add('selected');
                }
                
                day.onclick = () => selectDate(year, month, i);
                daysDiv.appendChild(day);
            }
            
            // Next month days
            const remainingDays = 42 - (startDay + totalDays);
            for (let i = 1; i <= remainingDays; i++) {
                const day = document.createElement('div');
                day.className = 'day other-month';
                day.textContent = i;
                daysDiv.appendChild(day);
            }
            
            renderEvents();
        }

        function selectDate(year, month, day) {
            selectedDate = new Date(year, month, day);
            renderCalendar();
        }

        function prevMonth() {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        }

        function nextMonth() {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        }

        function getEventKey(date) {
            return `${date.getFullYear()}-${date.getMonth()}-${date.getDate()}`;
        }

        function renderEvents() {
            const key = getEventKey(selectedDate);
            const eventList = events[key] || [];
            const eventListDiv = document.getElementById('eventList');
            
            if (eventList.length === 0) {
                eventListDiv.innerHTML = '<div class="event-item">暂无事件</div>';
            } else {
                eventListDiv.innerHTML = eventList.map((event, index) => 
                    `<div class="event-item">${event} <button onclick="deleteEvent(${index})" style="float:right;background:none;border:none;color:#ff6b6b;cursor:pointer;">✕</button></div>`
                ).join('');
            }
        }

        function addEvent() {
            const input = document.getElementById('eventInput');
            const event = input.value.trim();
            if (!event) return;
            
            const key = getEventKey(selectedDate);
            if (!events[key]) events[key] = [];
            events[key].push(event);
            localStorage.setItem('calendarEvents', JSON.stringify(events));
            
            input.value = '';
            renderEvents();
        }

        function deleteEvent(index) {
            const key = getEventKey(selectedDate);
            events[key].splice(index, 1);
            localStorage.setItem('calendarEvents', JSON.stringify(events));
            renderEvents();
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = 
                now.toLocaleTimeString('zh-CN', { hour12: false });
        }

        setInterval(updateClock, 1000);
        updateClock();
        renderCalendar();
    </script>
</body>
</html>
