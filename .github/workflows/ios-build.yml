name: Build iOS App

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: |
          npm install
          
      - name: Generate native iOS project
        run: npx expo prebuild --platform ios --clean
        
      - name: Install CocoaPods
        run: |
          cd ios
          pod install
        
      - name: Build iOS project
        run: |
          cd ios
          xcodebuild -workspace Runner.xcworkspace -scheme Runner -configuration Debug -destination "platform=iOS Simulator,name=iPhone 14" build
        
      - name: Upload IPA
        uses: actions/upload-artifact@v3
        with:
          name: openclaw-calendar.ipa
          path: ios/build/Build/Products/Debug-iphonesimulator/Runner.app
